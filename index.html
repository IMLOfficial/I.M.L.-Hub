<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>I.M.L. Official</title>

<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./logo.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./logo.svg">
<meta name="theme-color" content="#0b1220">
<meta name="description" content="Official I.M.L. hub for music, videos, and app updates.">

<style>
:root{
  --bg:#eef7ff;
  --fg:#0b1220;
  --accent:#4db8ff;
  --panel:rgba(255,255,255,.72);
}
[data-theme="dark"]{
  --bg:#0b1220;
  --fg:#eef7ff;
  --panel:rgba(11,18,32,.72);
}

*{box-sizing:border-box}
html{min-height:100%}
body{
  margin:0;
  min-height:100%;
  font-family:system-ui,Arial,sans-serif;
  background:
    linear-gradient(145deg,#071121 0%,#0b1220 42%,#071426 100%);
  color:var(--fg);
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 22%,rgba(77,184,255,.34),transparent 28rem),
    radial-gradient(circle at 18% 68%,rgba(89,255,244,.16),transparent 24rem),
    radial-gradient(circle at 82% 55%,rgba(83,109,255,.18),transparent 26rem),
    linear-gradient(rgba(90,203,255,.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(90,203,255,.05) 1px,transparent 1px),
    url("./logo.svg") center 150px / min(56vw,360px) no-repeat;
  background-size:auto,auto,auto,54px 54px,54px 54px,min(56vw,360px) auto;
  opacity:.34;
}
body::after{
  content:"";
  position:fixed;
  inset:-20%;
  z-index:0;
  pointer-events:none;
  background:
    conic-gradient(from 110deg at 50% 28%,transparent 0deg,rgba(37,146,255,.14) 58deg,transparent 118deg,rgba(69,242,255,.1) 190deg,transparent 255deg,rgba(93,113,255,.12) 315deg,transparent 360deg);
  filter:blur(18px);
  opacity:.72;
  animation:auroraShift 18s ease-in-out infinite alternate;
}
canvas#bg{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}
header,main,#installModal{
  position:relative;
  z-index:1;
}

header{
  padding:15px;
}
.btns{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.btns button,#installBox button,#installModal button{
  padding:10px 18px;
  border-radius:25px;
  border:0;
  background:var(--accent);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  touch-action:manipulation;
}
.btns button:hover,#installBox button:hover,#installModal button:hover{
  filter:brightness(1.08);
}

#hero{
  text-align:center;
  padding:70px 20px 48px;
}
.logo-wrap{
  position:relative;
  width:180px;
  height:180px;
  margin:0 auto 24px;
}
.logo-wrap img{
  width:100%;
  height:100%;
  object-fit:contain;
  position:relative;
  z-index:3;
  animation:float 6s ease-in-out infinite;
}
.glow{
  position:absolute;
  inset:-25%;
  z-index:1;
  border-radius:50%;
  background:radial-gradient(circle,rgba(120,200,255,.9),transparent 70%);
  filter:blur(40px);
  animation:pulse 4s infinite;
}
#orbit{
  position:absolute;
  inset:0;
  z-index:2;
}

@keyframes float{50%{transform:translateY(-12px)}}
@keyframes pulse{50%{opacity:.4}}
@keyframes auroraShift{
  0%{transform:translate3d(-2%,0,0) rotate(-4deg) scale(1)}
  100%{transform:translate3d(2%,3%,0) rotate(6deg) scale(1.08)}
}

section{
  padding:40px 20px;
}
section>h2,section>p{
  max-width:900px;
  margin-left:auto;
  margin-right:auto;
}
iframe{
  display:block;
  width:min(100%,900px);
  height:260px;
  margin:auto;
  border:0;
  border-radius:20px;
  background:#000;
}

#installBox{
  text-align:center;
}
#installBox button{
  padding:15px 35px;
  font-size:1.1em;
}
#installStatus{
  min-height:1.5em;
  opacity:.76;
  margin-top:10px;
}

#installModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  align-items:center;
  justify-content:center;
  padding:20px;
}
#installModal .card{
  width:min(100%,380px);
  background:var(--panel);
  color:var(--fg);
  padding:25px;
  border-radius:20px;
  text-align:center;
  backdrop-filter:blur(14px);
}
#installHelp{
  line-height:1.45;
  opacity:.86;
}
</style>
</head>

<body>
<canvas id="bg"></canvas>

<header>
  <h2>I.M.L.</h2>
  <div class="btns">
    <button type="button" onclick="toggleTheme()">Light / Dark</button>
    <button type="button" onclick="window.open('https://youtube.com/@i.m.l._official','_blank')">YouTube</button>
    <button type="button" onclick="window.open('https://www.tiktok.com/@i.m.l._officially?is_from_webapp=1&sender_device=pc','_blank')">TikTok</button>
  </div>
</header>

<main>
  <section id="hero">
    <div class="logo-wrap">
      <div class="glow"></div>
      <canvas id="orbit"></canvas>
      <img src="./logo.svg" alt="I.M.L. Logo">
    </div>
    <p>High-voltage sound | Cinematic visuals | I.M.L.</p>
  </section>

  <section>
    <h2>Latest Videos</h2>
    <iframe title="I.M.L. YouTube videos" src="https://www.youtube.com/embed?listType=playlist&list=UUes-oJI1M7Rr6oWIofhK6fg" allowfullscreen></iframe>
  </section>

  <section id="installBox">
    <h2>Install App</h2>
    <button type="button" id="installButton">Install</button>
    <p id="installStatus">Tap Install for browser install options.</p>
  </section>
</main>

<div id="installModal" aria-hidden="true">
  <div class="card">
    <h3>Install I.M.L. App</h3>
    <p id="installHelp">Checking your browser install options...</p>
    <button type="button" id="confirmInstall">Install</button><br><br>
    <button type="button" id="cancelInstall">Close</button>
  </div>
</div>

<script>
function toggleTheme(){
  document.body.dataset.theme = document.body.dataset.theme === "dark" ? "" : "dark";
}

const bg=document.getElementById("bg"),ctx=bg.getContext("2d");
let w,h,dpr,particles=[];
const mouse={x:innerWidth/2,y:innerHeight/2,active:false,pulse:0};
function makeParticle(){
  const speed=Math.random()*0.35+0.08;
  return {
    x:Math.random()*w,
    y:Math.random()*h,
    baseX:0,
    baseY:0,
    vx:(Math.random()-.5)*speed,
    vy:(Math.random()-.5)*speed,
    r:Math.random()*2.2+0.8,
    hue:190+Math.random()*45,
    drift:Math.random()*Math.PI*2
  };
}
function resize(){
  dpr=Math.min(devicePixelRatio||1,2);
  w=innerWidth;
  h=innerHeight;
  bg.width=Math.floor(w*dpr);
  bg.height=Math.floor(h*dpr);
  bg.style.width=w+"px";
  bg.style.height=h+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const count=Math.min(150,Math.max(70,Math.floor((w*h)/15000)));
  particles=[...Array(count)].map(makeParticle);
}
function movePointer(x,y){
  mouse.x=x;
  mouse.y=y;
  mouse.active=true;
  mouse.pulse=1;
}
addEventListener("resize",resize);
addEventListener("pointermove",event=>movePointer(event.clientX,event.clientY));
addEventListener("pointerdown",event=>movePointer(event.clientX,event.clientY));
addEventListener("pointerleave",()=>{mouse.active=false});
resize();
function drawAudioWaves(time){
  const centerY=Math.min(310,Math.max(190,h*.28));
  for(let layer=0;layer<4;layer++){
    const amp=18+layer*9;
    const gap=26+layer*8;
    ctx.beginPath();
    for(let x=-20;x<=w+20;x+=18){
      const y=centerY+Math.sin(x*.012+time*.0012+layer*1.6)*amp+Math.sin(x*.028-time*.0007)*gap;
      if(x===-20)ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(${80+layer*24},${190+layer*10},255,${0.08+layer*.035})`;
    ctx.lineWidth=1.5+layer*.5;
    ctx.stroke();
  }
}
function drawLogoRings(time){
  const cx=w/2;
  const cy=Math.min(250,Math.max(170,h*.24));
  for(let i=0;i<5;i++){
    const radius=130+i*44+Math.sin(time*.001+i)*6;
    const start=time*.00028+i*.9;
    ctx.beginPath();
    ctx.arc(cx,cy,radius,start,start+Math.PI*(1.05+i*.08));
    ctx.strokeStyle=`rgba(92,211,255,${0.13-i*.018})`;
    ctx.lineWidth=1.6;
    ctx.stroke();
  }
}
function drawBackground(time){
  const sweepX=(Math.sin(time*.00018)+1)*w*.5;
  const sweepY=(Math.cos(time*.00014)+1)*h*.5;
  const bgGlow=ctx.createRadialGradient(sweepX,sweepY,0,sweepX,sweepY,Math.max(w,h)*.72);
  bgGlow.addColorStop(0,"rgba(51,168,255,.18)");
  bgGlow.addColorStop(.45,"rgba(25,80,160,.09)");
  bgGlow.addColorStop(1,"rgba(4,10,24,0)");
  ctx.fillStyle=bgGlow;
  ctx.fillRect(0,0,w,h);
  drawAudioWaves(time);
  drawLogoRings(time);
  if(mouse.active||mouse.pulse>.02){
    const r=180+mouse.pulse*120;
    const glow=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,r);
    glow.addColorStop(0,"rgba(105,215,255,.28)");
    glow.addColorStop(.35,"rgba(39,128,255,.12)");
    glow.addColorStop(1,"rgba(39,128,255,0)");
    ctx.fillStyle=glow;
    ctx.fillRect(0,0,w,h);
  }
}
function animate(time=0){
  ctx.clearRect(0,0,w,h);
  drawBackground(time);
  for(const p of particles){
    p.drift+=0.01;
    const dx=p.x-mouse.x;
    const dy=p.y-mouse.y;
    const dist=Math.hypot(dx,dy)||1;
    if(dist<170){
      const push=(170-dist)/170;
      p.vx+=(dx/dist)*push*.055;
      p.vy+=(dy/dist)*push*.055;
    }
    p.vx+=Math.cos(p.drift)*0.002;
    p.vy+=Math.sin(p.drift)*0.002;
    p.vx*=0.985;
    p.vy*=0.985;
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<-20)p.x=w+20;
    if(p.x>w+20)p.x=-20;
    if(p.y<-20)p.y=h+20;
    if(p.y>h+20)p.y=-20;
  }
  for(let i=0;i<particles.length;i++){
    const a=particles[i];
    for(let j=i+1;j<particles.length;j++){
      const b=particles[j];
      const dx=a.x-b.x;
      const dy=a.y-b.y;
      const dist=Math.hypot(dx,dy);
      if(dist<115){
        const nearMouse=Math.max(0,1-Math.hypot((a.x+b.x)/2-mouse.x,(a.y+b.y)/2-mouse.y)/240);
        ctx.strokeStyle=`rgba(88,203,255,${(1-dist/115)*(0.12+nearMouse*0.34)})`;
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
    }
  }
  for(const p of particles){
    const cursorBoost=Math.max(0,1-Math.hypot(p.x-mouse.x,p.y-mouse.y)/190);
    const radius=p.r+cursorBoost*2.6;
    ctx.fillStyle=`hsla(${p.hue},100%,${70+cursorBoost*18}%,${0.62+cursorBoost*.35})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,radius,0,Math.PI*2);
    ctx.fill();
  }
  mouse.pulse*=0.94;
  requestAnimationFrame(animate);
}
animate();

const o=document.getElementById("orbit"),ox=o.getContext("2d");
function orbit(){
  o.width=o.offsetWidth;o.height=o.offsetHeight;
  ox.clearRect(0,0,o.width,o.height);
  for(let i=0;i<12;i++){
    const a=Date.now()/800+i;
    const r=o.width/2.2;
    ox.fillStyle="rgba(120,200,255,.9)";
    ox.beginPath();
    ox.arc(o.width/2+Math.cos(a)*r,o.height/2+Math.sin(a)*r,3,0,Math.PI*2);
    ox.fill();
  }
  requestAnimationFrame(orbit);
}
orbit();

let deferredPrompt;
const modal=document.getElementById("installModal");
const statusText=document.getElementById("installStatus");
const installButton=document.getElementById("installButton");
const installHelp=document.getElementById("installHelp");
const confirmInstall=document.getElementById("confirmInstall");

function isStandalone(){
  return matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;
}
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function setInstallStatus(){
  if(isStandalone()){
    installButton.textContent="Installed";
    statusText.textContent="I.M.L. is already installed.";
    return;
  }
  installButton.textContent="Install";
  statusText.textContent=deferredPrompt ? "Ready to install." : "Tap Install for browser install options.";
}
function openInstall(){
  if(isStandalone()){
    setInstallStatus();
    return;
  }
  modal.style.display="flex";
  modal.setAttribute("aria-hidden","false");
  if(deferredPrompt){
    confirmInstall.style.display="inline-block";
    installHelp.textContent="Your browser is ready to install I.M.L.";
    return;
  }
  confirmInstall.style.display="none";
  installHelp.textContent=isIOS()
    ? "On iPhone or iPad, tap Share, then Add to Home Screen."
    : "If the browser prompt does not appear, use the install icon in the address bar or open the browser menu and choose Install app. Refresh once if you just updated the site.";
}
function closeInstall(){
  modal.style.display="none";
  modal.setAttribute("aria-hidden","true");
}
async function doInstall(){
  if(!deferredPrompt){
    openInstall();
    return;
  }
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  closeInstall();
  setInstallStatus();
}

window.addEventListener("beforeinstallprompt",event=>{
  event.preventDefault();
  deferredPrompt=event;
  setInstallStatus();
});
window.addEventListener("appinstalled",()=>{
  deferredPrompt=null;
  closeInstall();
  setInstallStatus();
});
installButton.addEventListener("click",openInstall);
confirmInstall.addEventListener("click",doInstall);
document.getElementById("cancelInstall").addEventListener("click",closeInstall);
setInstallStatus();

if("serviceWorker" in navigator){
  addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"));
}
</script>
</body>
</html>
